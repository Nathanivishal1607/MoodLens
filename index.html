<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoodLens — AI Mood Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1009;
    --paper: #f5efe6;
    --warm: #c8753a;
    --accent: #e8b86d;
    --muted: #9a8c7e;
    --card: #fdf8f2;
    --line: #e0d5c8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(200,117,58,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(232,184,109,0.1) 0%, transparent 50%);
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo span { color: var(--warm); font-style: italic; }

  .tagline {
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .journal-area {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 28px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
    position: relative;
    box-shadow: 4px 4px 0 var(--line);
  }

  .journal-area::before {
    content: '';
    position: absolute;
    left: 40px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(200,117,58,0.2);
  }

  .journal-label {
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  textarea {
    width: 100%;
    min-height: 160px;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
    resize: none;
    line-height: 1.9;
    padding-left: 20px;
  }

  textarea::placeholder { color: var(--muted); font-style: italic; }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }

  .date-label {
    font-size: 0.68rem;
    color: var(--muted);
    flex: 1;
  }

  .analyze-btn {
    background: var(--warm);
    color: #fff;
    border: none;
    padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .analyze-btn:hover { background: #b5632a; transform: translateY(-1px); }
  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 4px solid var(--warm);
    border-radius: 2px;
    padding: 24px 28px;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
    box-shadow: 4px 4px 0 var(--line);
    display: none;
  }

  .result-card.visible { display: block; }

  .mood-tag {
    display: inline-block;
    background: var(--accent);
    color: var(--ink);
    padding: 3px 12px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 1px;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .mood-emoji {
    font-size: 2rem;
    margin-bottom: 10px;
    display: block;
  }

  .insight-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .suggestion {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.7;
    border-top: 1px dashed var(--line);
    padding-top: 12px;
    margin-top: 12px;
  }

  .history-section {
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .history-label {
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }

  .entry-card {
    display: flex;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
    animation: fadeUp 0.3s ease both;
  }

  .entry-emoji { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }

  .entry-meta { flex: 1; }

  .entry-text {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    color: var(--ink);
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .entry-mood {
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--warm);
  }

  .entry-time {
    font-size: 0.65rem;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 0.82rem;
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  .loading-dots span {
    animation: blink 1.2s infinite;
    font-size: 1.2rem;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .github-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 1px;
    margin-top: 40px;
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 1px;
    transition: all 0.2s;
  }
  .github-link:hover { color: var(--warm); border-color: var(--warm); }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">Mood<span>Lens</span></div>
    <div class="tagline">AI-Powered Mood Journal</div>
  </header>

  <div class="journal-area">
    <div class="journal-label">Today's Entry</div>
    <textarea id="journalText" placeholder="Write freely… how are you feeling right now? What's on your mind?"></textarea>
    <div class="controls">
      <div class="date-label" id="dateLabel"></div>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeEntry()">Analyze Mood →</button>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <span class="mood-emoji" id="resultEmoji">🌿</span>
    <div class="mood-tag" id="resultMoodTag">—</div>
    <div class="insight-text" id="resultInsight">Loading insight…</div>
    <div class="suggestion" id="resultSuggestion"></div>
  </div>

  <div class="history-section">
    <div class="history-label">Journal History</div>
    <div id="historyList"><div class="empty-state">Your entries will appear here after analysis.</div></div>
  </div>

  <a class="github-link" href="https://github.com/anthropics/anthropic-cookbook" target="_blank">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
    View Source on GitHub (anthropic-cookbook)
  </a>

</div>

<script>
  const entries = [];

  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  async function analyzeEntry() {
    const text = document.getElementById('journalText').value.trim();
    if (!text) return alert('Please write something first.');

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-dots"><span>·</span><span>·</span><span>·</span></span>';

    const resultCard = document.getElementById('resultCard');
    resultCard.classList.remove('visible');

    try {
      const API_KEY = "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";

      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
          model: "openai/gpt-3.5-turbo",  
          max_tokens: 1000,
          messages: [
            {
              role: "system",
              content: `You are a compassionate mood analysis assistant for a journaling app.
Analyze the user's journal entry and respond ONLY with a JSON object (no markdown, no backticks) with these fields:
- mood: a 1-2 word mood label
- emoji: a single fitting emoji
- insight: 2-3 warm, empathetic sentences
- suggestion: one gentle, practical suggestion`
            },
            { role: "user", content: text }
          ]
        })
      });

      /* FIX 1: response error check */
      if (!response.ok) {
        const err = await response.text();
        console.error("Request failed:", err);
        alert("API request failed. Check console.");
        return;
      }

      const data = await response.json();

      /* FIX 2: check choices exists */
      if (!data.choices || data.choices.length === 0) {
        console.error("API Error:", data);
        alert("AI response failed. Check API key or model.");
        return;
      }

      const raw = data.choices[0].message.content;
      const cleaned = raw.replace(/```json|```/g, '').trim();
      const result = JSON.parse(cleaned);

      document.getElementById('resultEmoji').textContent = result.emoji || '🌿';
      document.getElementById('resultMoodTag').textContent = result.mood || 'Reflective';
      document.getElementById('resultInsight').textContent = result.insight;
      document.getElementById('resultSuggestion').textContent = '💡 ' + result.suggestion;
      resultCard.classList.add('visible');

      entries.unshift({
        text,
        mood: result.mood,
        emoji: result.emoji,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
      });

      renderHistory();
      document.getElementById('journalText').value = '';

    } catch (e) {
      alert('Something went wrong. Please try again.');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Analyze Mood →';
    }
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!entries.length) {
      list.innerHTML = '<div class="empty-state">Your entries will appear here after analysis.</div>';
      return;
    }
    list.innerHTML = entries.map(e => `
      <div class="entry-card">
        <div class="entry-emoji">${e.emoji}</div>
        <div class="entry-meta">
          <div class="entry-text">${e.text}</div>
          <div class="entry-mood">${e.mood}</div>
        </div>
        <div class="entry-time">${e.time}</div>
      </div>
    `).join('');
  }

  renderHistory();
</script>
</body>
</html>
